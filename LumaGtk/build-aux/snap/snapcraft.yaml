name: luma
base: core26
build-base: devel
version: '0.1.0'
summary: Dynamic instrumentation toolkit built on Frida
description: |
  Luma is an interactive dynamic instrumentation app built on Frida.
  Attach to running processes, instrument functions, trace calls, and
  explore memory with a graphical interface.

grade: devel
confinement: devmode

platforms:
  amd64:
    build-on: amd64

apps:
  luma:
    command: usr/local/bin/luma
    plugs:
      - home
      - network
      - process-control
      - system-observe

parts:
  swift:
    plugin: nil
    override-build: |
      curl -sL "https://download.swift.org/swift-6.2-release/ubuntu2404/swift-6.2-RELEASE/swift-6.2-RELEASE-ubuntu24.04.tar.gz" \
        -o swift.tar.gz
      tar xzf swift.tar.gz --strip-components=2 -C "$CRAFT_STAGE"
      rm swift.tar.gz
      # core26 ships libxml2.so.16 only; Swift 6.2's ubuntu24 tarball
      # links libFoundationXML against libxml2.so.2. libFoundationXML's
      # DT_RUNPATH is \$ORIGIN, so the alias has to sit beside it
      # under lib/swift/linux (not the top-level lib/).
      ln -sf /usr/lib/x86_64-linux-gnu/libxml2.so.16 \
        "$CRAFT_STAGE/lib/swift/linux/libxml2.so.2"
    build-packages:
      - curl
      - libxml2-16

  nodejs:
    plugin: nil
    override-build: |
      curl -sL "https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.xz" \
        -o node.tar.xz
      tar xJf node.tar.xz --strip-components=1 -C "$CRAFT_STAGE"
      rm node.tar.xz
    build-packages:
      - curl
      - xz-utils

  frida-core:
    after: [nodejs]
    plugin: nil
    override-build: |
      export PATH="$CRAFT_STAGE/bin:$PATH"
      git clone --depth 1 https://github.com/frida/frida-core.git src
      cd src
      ./configure --enable-shared --without-prebuilds=sdk --prefix="$CRAFT_STAGE/usr/local" -- --force-fallback-for=openssl,libelf -Dcompat=disabled -Dserver=disabled -Dportal=disabled -Dinject=disabled -Dgadget=disabled -Dtests=disabled
      make -j$(nproc)
      DESTDIR="$PWD/_destdir" python3 releng/meson/meson.py install -C build --skip-subprojects --no-rebuild
      mkdir -p "$CRAFT_STAGE/usr/local"
      cp -a "_destdir/$CRAFT_STAGE/usr/local/." "$CRAFT_STAGE/usr/local/"
      mkdir -p "$CRAFT_PART_INSTALL/usr/local/lib/x86_64-linux-gnu"
      cp -a "$CRAFT_STAGE/usr/local/lib/x86_64-linux-gnu"/libfrida-core-1.0.so* "$CRAFT_PART_INSTALL/usr/local/lib/x86_64-linux-gnu/"
      cp -a "$CRAFT_STAGE/usr/local/lib/x86_64-linux-gnu/frida-1.0" "$CRAFT_PART_INSTALL/usr/local/lib/x86_64-linux-gnu/"
    build-packages:
      - git
      - curl
      - python3
      - python3-pip
      - valac
      - meson
      - ninja-build
      - libglib2.0-dev
      - libgee-0.8-dev
      - libjson-glib-dev
      - libsoup-3.0-dev
      - libunwind-dev
      - libnice-dev

  radare2:
    plugin: nil
    override-build: |
      git clone https://github.com/radareorg/radare2.git src
      cd src
      git checkout c08254586bc9d99a187aab5279e130eff39e37a7
      meson setup build --prefix="$CRAFT_STAGE/usr/local" --default-library=static -Dstatic_runtime=true -Dcli=disabled
      ninja -C build
      ninja -C build install
    build-packages:
      - git
      - pkg-config
      - meson
      - ninja-build

  luma:
    after: [swift, frida-core, radare2]
    plugin: nil
    source: https://github.com/frida/luma.git
    source-branch: cross-platform
    override-build: |
      export PATH="$CRAFT_STAGE/usr/bin:$CRAFT_STAGE/usr/local/bin:$CRAFT_STAGE/bin:$PATH"
      export PKG_CONFIG_PATH="$CRAFT_STAGE/usr/local/lib/pkgconfig:$CRAFT_STAGE/usr/local/lib/x86_64-linux-gnu/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
      export LD_LIBRARY_PATH="$CRAFT_STAGE/usr/local/lib:$CRAFT_STAGE/usr/local/lib/x86_64-linux-gnu${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      export C_INCLUDE_PATH="$CRAFT_STAGE/usr/local/include${C_INCLUDE_PATH:+:$C_INCLUDE_PATH}"
      PARENT="$(dirname "$CRAFT_PART_BUILD")"
      mv "$CRAFT_PART_BUILD" "$PARENT/luma"
      cd "$PARENT/luma/LumaGtk"
      make build SWIFT_BUILD_FLAGS="-c release"
      # Bundle the runtime libraries the snap needs at runtime
      # alongside the binary: frida-core is shipped by the
      # frida-core part (into /usr/local/lib/x86_64-linux-gnu), while
      # the Swift runtime lives in $CRAFT_STAGE/lib/swift/linux from
      # the swift part, so copy the subset we actually need next to
      # the app under /usr/local/lib/luma/swift/.
      SWIFT_SRC="$CRAFT_STAGE/lib/swift/linux"
      SWIFT_DST="$CRAFT_PART_INSTALL/usr/local/lib/luma/swift"
      install -d "$SWIFT_DST"
      for so in "$SWIFT_SRC"/*.so; do
        case "$(basename "$so")" in
          libXCTest.so|libTesting.so|lib_Testing_Foundation.so) continue ;;
        esac
        cp -P "$so" "$SWIFT_DST/"
      done
      # Swift's FoundationXML keeps DT_NEEDED on libxml2.so.2, but
      # core26 ships the libxml2 2.14 series as libxml2.so.16. Drop
      # it next to libFoundationXML.so under the legacy SONAME so the
      # .so's own DT_RUNPATH (=$ORIGIN) resolves the load.
      install -m644 /usr/lib/x86_64-linux-gnu/libxml2.so.16 \
        "$SWIFT_DST/libxml2.so.2"
      install -Dm755 .build/x86_64-unknown-linux-gnu/release/LumaGtk "$CRAFT_PART_INSTALL/usr/local/bin/luma"
      strip --strip-unneeded "$CRAFT_PART_INSTALL/usr/local/bin/luma"
      strip --strip-unneeded "$SWIFT_DST"/*.so
      patchelf --set-rpath '$ORIGIN/../lib/luma/swift:$ORIGIN/../lib/x86_64-linux-gnu' \
               "$CRAFT_PART_INSTALL/usr/local/bin/luma"
      install -Dm644 data/re.frida.Luma.desktop "$CRAFT_PART_INSTALL/usr/local/share/applications/re.frida.Luma.desktop"
      install -Dm644 data/re.frida.Luma.xml "$CRAFT_PART_INSTALL/usr/local/share/mime/packages/re.frida.Luma.xml"
      for size in 32 48 64 128 256 512; do
        install -Dm644 "data/icons/hicolor/${size}x${size}/apps/re.frida.Luma.png" \
          "$CRAFT_PART_INSTALL/usr/local/share/icons/hicolor/${size}x${size}/apps/re.frida.Luma.png"
      done
      mv "$PARENT/luma" "$CRAFT_PART_BUILD"
    build-packages:
      - libgtk-4-dev
      - libadwaita-1-dev
      - libwebkitgtk-6.0-dev
      - libglib2.0-dev
      - libpango1.0-dev
      - libcairo2-dev
      - libharfbuzz-dev
      - libgdk-pixbuf-2.0-dev
      - libgraphene-1.0-dev
      - libsoup-3.0-dev
      - gobject-introspection
      - libgirepository1.0-dev
      - libatk1.0-dev
      - libxml2-dev
      - nodejs
      - npm
      - patchelf
      - pkg-config
    stage-packages:
      - libgtk-4-1
      - libadwaita-1-0
      - libwebkitgtk-6.0-4
      - libsoup-3.0-0
