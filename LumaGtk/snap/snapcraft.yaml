name: luma
base: core22
version: '0.1.0'
summary: Dynamic instrumentation toolkit built on Frida
description: |
  Luma is an interactive dynamic instrumentation app built on Frida.
  Attach to running processes, instrument functions, trace calls, and
  explore memory with a graphical interface.

grade: devel
confinement: devmode

architectures:
  - build-on: amd64

apps:
  luma:
    command: usr/local/bin/luma
    extensions: [gnome]
    plugs:
      - home
      - network
      - process-control
      - system-observe

parts:
  swift:
    plugin: nil
    override-build: |
      curl -sL "https://download.swift.org/swift-6.1-release/ubuntu2204/swift-6.1-RELEASE/swift-6.1-RELEASE-ubuntu22.04.tar.gz" \
        -o swift.tar.gz
      tar xzf swift.tar.gz --strip-components=2 -C "$CRAFT_STAGE"
      rm swift.tar.gz
    build-packages:
      - curl

  frida-core:
    plugin: nil
    override-build: |
      git clone --depth 1 https://github.com/frida/frida-core.git src
      cd src
      ./configure --enable-shared --without-prebuilds=sdk --prefix="$CRAFT_STAGE/usr/local" -- --force-fallback-for=openssl
      make -j$(nproc)
      make install
    build-packages:
      - git
      - curl
      - python3
      - python3-pip
      - valac
      - meson
      - ninja-build
      - libglib2.0-dev
      - libgee-0.8-dev
      - libjson-glib-dev
      - libsoup-3.0-dev
      - libunwind-dev
      - libnice-dev
      - libelf-dev

  radare2:
    plugin: meson
    source: https://github.com/radareorg/radare2.git
    source-commit: 65ee12a4f0d67f24a1b968111c536de3bb5bb4e3
    meson-parameters:
      - --prefix=/usr/local
    build-packages:
      - pkg-config

  luma:
    after: [swift, frida-core, radare2]
    plugin: nil
    source: .
    source-type: local
    override-build: |
      export PATH="$CRAFT_STAGE/usr/bin:$CRAFT_STAGE/usr/local/bin:$CRAFT_STAGE/bin:$PATH"
      export PKG_CONFIG_PATH="$CRAFT_STAGE/usr/local/lib/pkgconfig:$CRAFT_STAGE/usr/local/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH"
      export LD_LIBRARY_PATH="$CRAFT_STAGE/usr/local/lib:$CRAFT_STAGE/usr/local/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
      cd LumaGtk
      make build SWIFT_BUILD_FLAGS="-c release"
      install -Dm755 .build/release/LumaGtk "$CRAFT_PART_INSTALL/usr/local/bin/luma"
      install -Dm644 data/re.frida.Luma.desktop "$CRAFT_PART_INSTALL/usr/local/share/applications/re.frida.Luma.desktop"
      install -Dm644 data/re.frida.Luma.xml "$CRAFT_PART_INSTALL/usr/local/share/mime/packages/re.frida.Luma.xml"
    build-packages:
      - libgtk-4-dev
      - libwebkitgtk-6.0-dev
      - libglib2.0-dev
      - libpango1.0-dev
      - libcairo2-dev
      - libharfbuzz-dev
      - libgdk-pixbuf-2.0-dev
      - libgraphene-1.0-dev
      - libsoup-3.0-dev
      - gobject-introspection
      - libgirepository1.0-dev
      - libxml2-dev
      - nodejs
      - npm
      - pkg-config
    stage-packages:
      - libgtk-4-1
      - libwebkitgtk-6.0-4
      - libsoup-3.0-0
