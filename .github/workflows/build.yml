name: Build

on:
  push:
    branches: [main, cross-platform]
  pull_request:

env:
  FRIDA_CORE_REF: "main"
  RADARE2_REF: "65ee12a4f0d67f24a1b968111c536de3bb5bb4e3"
  SWIFT_VERSION: "6.2"

jobs:
  macos:
    if: false  # TODO: enable once cross-platform branch SwiftUI compiles
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -derivedDataPath build/.derived \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p build
          cp -r build/.derived/Build/Products/Release/Luma.app build/

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -r build/Luma.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname Luma \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            Luma.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Luma.dmg
          path: Luma.dmg

  fedora:
    if: false  # Passes — disabled while iterating on other jobs
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gtk4-devel \
            webkitgtk6.0-devel \
            glib2-devel \
            pango-devel \
            cairo-devel \
            harfbuzz-devel \
            gdk-pixbuf2-devel \
            graphene-devel \
            libsoup3-devel \
            gobject-introspection-devel \
            atk-devel \
            libxml2-devel \
            libgee-devel \
            json-glib-devel \
            libunwind-devel \
            libdwarf-devel \
            elfutils-devel \
            libnice-devel \
            ngtcp2-devel \
            ngtcp2-crypto-ossl-devel \
            openssl-devel \
            vala \
            meson \
            ninja-build \
            nodejs \
            npm \
            gcc \
            gcc-c++ \
            libstdc++-devel \
            libstdc++-static \
            kernel-headers \
            glibc-devel \
            make \
            git \
            which \
            curl \
            pkg-config \
            rpm-build \
            python3-pip \
            python3-setuptools

      - name: Install Swift
        run: |
          dnf install -y swiftlang
          swift --version

      - name: Build frida-core (shared)
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone --depth 1 -b $FRIDA_CORE_REF https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          ./configure --enable-shared --without-prebuilds=sdk --prefix=/usr/local
          make -j$(nproc)
          make install
          ldconfig
          pkg-config --modversion frida-core-1.0

      - name: Build radare2 (static)
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr/local --default-library=static -Dstatic_runtime=true
          ninja -C build
          ninja -C build install
          ldconfig
          pkg-config --modversion r_core

      - uses: actions/checkout@v4

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package
        run: |
          mkdir -p pkg/usr/local/{bin,share/applications,share/mime/packages}
          cp LumaGtk/.build/release/LumaGtk pkg/usr/local/bin/luma
          cp LumaGtk/data/re.frida.Luma.desktop pkg/usr/local/share/applications/
          cp LumaGtk/data/re.frida.Luma.xml pkg/usr/local/share/mime/packages/
          tar czf luma-fedora-43.tar.gz -C pkg .

      - uses: actions/upload-artifact@v4
        with:
          name: luma-fedora-43.tar.gz
          path: luma-fedora-43.tar.gz

  ubuntu:
    runs-on: ubuntu-latest
    container: ubuntu:25.10
    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y universe
          apt-get update
          apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libharfbuzz-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            libsoup-3.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libatk1.0-dev \
            libxml2-dev \
            libgee-0.8-dev \
            libjson-glib-dev \
            libunwind-dev \
            libnice-dev \
            valac \
            meson \
            ninja-build \
            pkg-config \
            dpkg-dev \
            nodejs \
            npm \
            curl \
            git \
            make \
            binutils \
            python3-pip \
            gcc \
            g++

      - name: Install Swift
        run: |
          apt-get install -y libncurses6 libcurl4-openssl-dev
          ln -sf libxml2.so.16 /usr/lib/x86_64-linux-gnu/libxml2.so.2
          ldconfig
          curl -sLO "https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04.tar.gz"
          tar xzf swift-*.tar.gz -C /usr/local --strip-components=2
          rm swift-*.tar.gz
          ldconfig
          swift --version

      - name: Build frida-core (shared)
        run: |
          git clone --depth 1 -b $FRIDA_CORE_REF https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          ./configure --enable-shared --without-prebuilds=sdk --prefix=/usr/local \
            -- --force-fallback-for=openssl
          make -j$(nproc)
          make install
          ldconfig
          pkg-config --modversion frida-core-1.0

      - name: Build radare2 (static)
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr/local --default-library=static -Dstatic_runtime=true
          ninja -C build
          ninja -C build install
          ldconfig
          pkg-config --modversion r_core

      - uses: actions/checkout@v4

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package as .deb
        run: |
          PKG=luma_0.1.0_amd64
          mkdir -p $PKG/DEBIAN $PKG/usr/local/bin $PKG/usr/local/share/applications $PKG/usr/local/share/mime/packages
          printf 'Package: luma\nVersion: 0.1.0\nSection: devel\nPriority: optional\nArchitecture: amd64\nDepends: libgtk-4-1, libwebkitgtk-6.0-4, libsoup-3.0-0\nMaintainer: Ole Andre Vadla Ravnas <oleavr@frida.re>\nDescription: Luma - Dynamic instrumentation toolkit\n Interactive dynamic instrumentation app built on Frida.\n' > $PKG/DEBIAN/control
          cp LumaGtk/.build/x86_64-unknown-linux-gnu/release/LumaGtk $PKG/usr/local/bin/luma
          cp LumaGtk/data/re.frida.Luma.desktop $PKG/usr/local/share/applications/
          cp LumaGtk/data/re.frida.Luma.xml $PKG/usr/local/share/mime/packages/
          dpkg-deb --build $PKG
          mv ${PKG}.deb luma-ubuntu-25.10.deb

      - uses: actions/upload-artifact@v4
        with:
          name: luma-ubuntu-25.10.deb
          path: luma-ubuntu-25.10.deb

  flatpak:
    if: false  # TODO: enable after Fedora passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build \
            LumaGtk/re.frida.Luma.flatpak.json
          flatpak build-bundle flatpak-repo luma.flatpak re.frida.Luma

      - uses: actions/upload-artifact@v4
        with:
          name: luma.flatpak
          path: luma.flatpak

  snap:
    if: false  # TODO: enable after Fedora passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snapcore/action-build@v1
        id: snapcraft
        with:
          path: LumaGtk

      - uses: actions/upload-artifact@v4
        with:
          name: luma.snap
          path: ${{ steps.snapcraft.outputs.snap }}
