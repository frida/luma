name: Build

on:
  push:
    branches: [main, cross-platform]
  pull_request:

env:
  FRIDA_CORE_REF: "main"
  RADARE2_REF: "5e3b30e883b08b7fe822d081e2b4d142d96ae3fc"
  SWIFT_VERSION: "6.2"
  # ilammy/msvc-dev-cmd hasn't cut a Node-24-compatible release yet
  # (v1 is its only major). Opt into Node 24 ahead of GitHub's
  # forced migration in June 2026 so the warning doesn't clutter
  # every build log in the meantime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  macos:
    runs-on: macos-26
    strategy:
      matrix:
        arch: [arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install the Apple certificates
        env:
          CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "No signing certificates configured, skipping"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/apple-certificates.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/luma-signing.keychain-db
          echo -n "$CERTIFICATES_P12" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $CERTIFICATE_PATH
          MACOS_CERTID=$(security find-identity -v -p codesigning | grep "Developer ID Application: " | awk '{ print $2 }')
          echo "MACOS_CERTID=$MACOS_CERTID" >> $GITHUB_ENV
          echo "CAN_SIGN=true" >> $GITHUB_ENV

      - name: Build
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -derivedDataPath build/.derived \
            -arch ${{ matrix.arch }} \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p build
          cp -r build/.derived/Build/Products/Release/Luma.app build/

      - name: Post-process binary
        run: |
          BINARY=build/Luma.app/Contents/MacOS/Luma
          install_name_tool -change \
            @rpath/Radare2.framework/Versions/A/Radare2 \
            @rpath/Radare2.framework/Radare2 \
            "$BINARY"
          strip -Sx "$BINARY"
          for fw in build/Luma.app/Contents/Frameworks/*.framework; do
            if [ -d "$fw/Versions" ]; then
              rm -rf "$fw/Versions"
            fi
            name=$(basename "$fw" .framework)
            if lipo -info "$fw/$name" 2>/dev/null | grep -q "Non-fat\|Architectures"; then
              lipo -thin ${{ matrix.arch }} "$fw/$name" -output "$fw/$name.thin"
              mv "$fw/$name.thin" "$fw/$name"
            fi
          done

      - name: Sign
        if: env.CAN_SIGN == 'true'
        run: |
          find build/Luma.app/Contents/Frameworks -name '*.framework' -maxdepth 1 | while read fw; do
            name=$(basename "$fw" .framework)
            codesign --force --options runtime --sign "Developer ID Application" --timestamp "$fw/$name"
          done
          codesign --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements Luma/Luma.entitlements \
            --timestamp \
            build/Luma.app

      - name: Notarize
        if: env.CAN_SIGN == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARY_PASSWORD"
          ditto -c -k --sequesterRsrc build/Luma.app Luma-notarize.zip
          RESULT=$(xcrun notarytool submit Luma-notarize.zip \
            --keychain-profile "notarytool-profile" \
            --wait 2>&1) || true
          echo "$RESULT"
          ID=$(echo "$RESULT" | grep '  id:' | head -1 | awk '{print $2}')
          STATUS=$(echo "$RESULT" | grep '  status:' | head -1 | awk '{print $2}')
          if [ "$STATUS" != "Accepted" ]; then
            echo "--- Notarization log ---"
            xcrun notarytool log "$ID" --keychain-profile "notarytool-profile" 2>&1 || true
            exit 1
          fi
          xcrun stapler staple build/Luma.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Luma" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Luma.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            Luma-${{ matrix.arch }}.dmg \
            build/Luma.app

      - uses: actions/upload-artifact@v7
        with:
          name: Luma-${{ matrix.arch }}.dmg
          path: Luma-${{ matrix.arch }}.dmg

  fedora:
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gtk4-devel \
            webkitgtk6.0-devel \
            glib2-devel \
            pango-devel \
            cairo-devel \
            harfbuzz-devel \
            gdk-pixbuf2-devel \
            graphene-devel \
            libsoup3-devel \
            gobject-introspection-devel \
            atk-devel \
            libxml2-devel \
            libgee-devel \
            json-glib-devel \
            libunwind-devel \
            libdwarf-devel \
            elfutils-devel \
            libnice-devel \
            ngtcp2-devel \
            ngtcp2-crypto-ossl-devel \
            openssl-devel \
            vala \
            meson \
            ninja-build \
            nodejs \
            npm \
            gcc \
            gcc-c++ \
            libstdc++-devel \
            libstdc++-static \
            kernel-headers \
            glibc-devel \
            make \
            git \
            which \
            curl \
            pkg-config \
            rpm-build \
            python3-pip \
            python3-setuptools

      - name: Install Swift
        run: |
          dnf install -y swiftlang
          swift --version

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-fedora43-frida-core-${{ env.FRIDA_CORE_REF }}-v1

      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone --depth 1 -b $FRIDA_CORE_REF https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          ./configure --enable-shared --without-prebuilds=sdk --prefix=/usr
          make -j$(nproc)
          DESTDIR=/tmp/frida-destdir make install

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-fedora43-frida-core-${{ env.FRIDA_CORE_REF }}-v1

      - name: Install frida-core
        run: |
          cp -a /tmp/frida-destdir/usr/. /usr/
          ldconfig

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-fedora43-radare2-${{ env.RADARE2_REF }}-v1

      - name: Build radare2 (static)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr --default-library=static -Dstatic_runtime=true -Dcli=disabled
          DESTDIR=/tmp/r2-destdir ninja -C build install

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-fedora43-radare2-${{ env.RADARE2_REF }}-v1

      - name: Install radare2
        run: |
          cp -a /tmp/r2-destdir/usr/. /usr/
          ldconfig

      - uses: actions/checkout@v6

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package
        run: |
          mkdir -p pkg/usr/{bin,share/applications,share/mime/packages}
          cp LumaGtk/.build/release/LumaGtk pkg/usr/bin/luma
          strip --strip-unneeded pkg/usr/bin/luma
          cp LumaGtk/data/re.frida.Luma.desktop pkg/usr/share/applications/
          cp LumaGtk/data/re.frida.Luma.xml pkg/usr/share/mime/packages/
          tar czf luma-fedora-43.tar.gz -C pkg .

      - uses: actions/upload-artifact@v7
        with:
          name: luma-fedora-43.tar.gz
          path: luma-fedora-43.tar.gz

  ubuntu:
    runs-on: ubuntu-latest
    container: ubuntu:25.10
    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y universe
          apt-get update
          apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libharfbuzz-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            libsoup-3.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libatk1.0-dev \
            libxml2-dev \
            libgee-0.8-dev \
            libjson-glib-dev \
            libunwind-dev \
            libnice-dev \
            valac \
            meson \
            ninja-build \
            pkg-config \
            dpkg-dev \
            nodejs \
            npm \
            curl \
            git \
            make \
            binutils \
            python3-pip \
            gcc \
            g++

      - name: Install Swift
        run: |
          apt-get install -y libncurses6 libcurl4-openssl-dev
          ln -sf libxml2.so.16 /usr/lib/x86_64-linux-gnu/libxml2.so.2
          ldconfig
          curl -sLO "https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04.tar.gz"
          tar xzf swift-*.tar.gz -C /usr/local --strip-components=2
          rm swift-*.tar.gz
          ldconfig
          swift --version

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-ubuntu2510-frida-core-${{ env.FRIDA_CORE_REF }}-v1

      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 -b $FRIDA_CORE_REF https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          ./configure --enable-shared --without-prebuilds=sdk --prefix=/usr \
            -- --force-fallback-for=openssl
          make -j$(nproc)
          DESTDIR=/tmp/frida-destdir make install

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-ubuntu2510-frida-core-${{ env.FRIDA_CORE_REF }}-v1

      - name: Install frida-core
        run: |
          cp -a /tmp/frida-destdir/usr/. /usr/
          ldconfig

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-ubuntu2510-radare2-${{ env.RADARE2_REF }}-v1

      - name: Build radare2 (static)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr --default-library=static -Dstatic_runtime=true -Dcli=disabled
          DESTDIR=/tmp/r2-destdir ninja -C build install

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-ubuntu2510-radare2-${{ env.RADARE2_REF }}-v1

      - name: Install radare2
        run: |
          cp -a /tmp/r2-destdir/usr/. /usr/
          ldconfig

      - uses: actions/checkout@v6

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package as .deb
        run: |
          PKG=luma_0.1.0_amd64
          mkdir -p $PKG/DEBIAN $PKG/usr/bin $PKG/usr/share/applications $PKG/usr/share/mime/packages
          printf 'Package: luma\nVersion: 0.1.0\nSection: devel\nPriority: optional\nArchitecture: amd64\nDepends: libgtk-4-1, libwebkitgtk-6.0-4, libsoup-3.0-0\nMaintainer: Ole Andre Vadla Ravnas <oleavr@frida.re>\nDescription: Luma - Dynamic instrumentation toolkit\n Interactive dynamic instrumentation app built on Frida.\n' > $PKG/DEBIAN/control
          cp LumaGtk/.build/x86_64-unknown-linux-gnu/release/LumaGtk $PKG/usr/bin/luma
          strip --strip-unneeded $PKG/usr/bin/luma
          cp LumaGtk/data/re.frida.Luma.desktop $PKG/usr/share/applications/
          cp LumaGtk/data/re.frida.Luma.xml $PKG/usr/share/mime/packages/
          dpkg-deb --build $PKG
          mv ${PKG}.deb luma-ubuntu-25.10.deb

      - uses: actions/upload-artifact@v7
        with:
          name: luma-ubuntu-25.10.deb
          path: luma-ubuntu-25.10.deb

  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Restore flatpak-builder cache
        id: flatpak-cache
        uses: actions/cache/restore@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-v1

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --disable-rofiles-fuse \
            --keep-build-dirs \
            --repo=flatpak-repo \
            flatpak-build \
            LumaGtk/re.frida.Luma.flatpak.json
          flatpak build-bundle flatpak-repo luma.flatpak re.frida.Luma

      - name: Save flatpak-builder cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-v1

      - uses: actions/upload-artifact@v7
        with:
          name: luma.flatpak
          path: luma.flatpak

  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: snapcore/action-build@v1.3.0
        id: snapcraft
        with:
          path: LumaGtk

      - uses: actions/upload-artifact@v7
        with:
          name: luma.snap
          path: ${{ steps.snapcraft.outputs.snap }}

  windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - uses: compnerd/gha-setup-swift@v0.4.0
        with:
          swift-version: "swift-${{ env.SWIFT_VERSION }}-release"
          swift-build: "${{ env.SWIFT_VERSION }}-RELEASE"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install meson ninja setuptools

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-release-v8

      - name: Install dependencies via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: >-
          vcpkg install
          --overlay-triplets=${{ github.workspace }}/.github/vcpkg-triplets
          --overlay-ports=${{ github.workspace }}/.github/vcpkg-ports
          --triplet x64-windows-release
          glib glib-networking json-glib libsoup nghttp2 gtk[introspection] atk[introspection] libadwaita[introspection] libxml2 graphite2 sqlite3[snapshot] webview2

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-release-v8

      - name: Set up vcpkg environment
        shell: bash
        run: |
          VCPKG_PREFIX="C:/vcpkg/installed/x64-windows-release"
          echo "$VCPKG_PREFIX/tools/pkgconf" >> $GITHUB_PATH
          echo "$VCPKG_PREFIX/bin" >> $GITHUB_PATH
          echo "$VCPKG_PREFIX/tools" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=$VCPKG_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          echo "GIR_EXTRA_SEARCH_PATH=$VCPKG_PREFIX/share/gir-1.0" >> $GITHUB_ENV
          # Package.swift calls "pkg-config"; vcpkg ships pkgconf.exe. Alias it.
          if [ -f "$VCPKG_PREFIX/tools/pkgconf/pkgconf.exe" ] && [ ! -f "$VCPKG_PREFIX/tools/pkgconf/pkg-config.exe" ]; then
            cp "$VCPKG_PREFIX/tools/pkgconf/pkgconf.exe" "$VCPKG_PREFIX/tools/pkgconf/pkg-config.exe"
          fi
          # SwiftPM's internal .systemLibrary(pkgConfig:) resolution fails
          # to find pkg-config via its own Process spawner on Windows. The
          # consumer — clang compiling C shim sources — reads CPATH for
          # header search, so pre-populate it with the vcpkg gtk4 include
          # dirs as a cross-target fallback.
          #
          # Don't add $VCPKG_PREFIX/include itself — vcpkg drops a dirent.h
          # polyfill there that conflicts with Swift's _FoundationCShims.
          # Mirror the root-level headers into a staging dir, skipping the
          # ones that clash.
          STAGE="$VCPKG_PREFIX/include/vcpkg-shim"
          mkdir -p "$STAGE"
          for hdr in "$VCPKG_PREFIX"/include/*.h; do
            name=$(basename "$hdr")
            case "$name" in
              dirent.h) ;;
              *) cp "$hdr" "$STAGE/" ;;
            esac
          done
          CPATH="$VCPKG_PREFIX/include/libadwaita-1"
          CPATH="$CPATH;$VCPKG_PREFIX/include/gtk-4.0"
          CPATH="$CPATH;$VCPKG_PREFIX/include/pango-1.0"
          CPATH="$CPATH;$VCPKG_PREFIX/include/harfbuzz"
          CPATH="$CPATH;$VCPKG_PREFIX/include/gdk-pixbuf-2.0"
          CPATH="$CPATH;$VCPKG_PREFIX/include/cairo"
          CPATH="$CPATH;$VCPKG_PREFIX/include/graphene-1.0"
          CPATH="$CPATH;$VCPKG_PREFIX/lib/graphene-1.0/include"
          CPATH="$CPATH;$VCPKG_PREFIX/include/glib-2.0"
          CPATH="$CPATH;$VCPKG_PREFIX/lib/glib-2.0/include"
          CPATH="$CPATH;$STAGE"
          echo "CPATH=$CPATH" >> $GITHUB_ENV
          echo "CPLUS_INCLUDE_PATH=$CPATH" >> $GITHUB_ENV

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\frida-prefix
          key: ${{ runner.os }}-frida-core-${{ env.FRIDA_CORE_REF }}-v4

      - name: Install Go toolchain
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install MinGW toolchain for cgo
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
          path-type: inherit

      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 -b $env:FRIDA_CORE_REF https://github.com/frida/frida-core.git $env:RUNNER_TEMP\frida-core
          Push-Location $env:RUNNER_TEMP\frida-core
          git submodule update --init --recursive --depth 1
          python -c "import sys; sys.path.insert(0, '.'); from releng.meson_configure import main; main()" `
              . `
              --enable-shared `
              --without-prebuilds=sdk `
              "--prefix=$env:RUNNER_TEMP\frida-prefix" `
              -- --force-fallback-for=openssl -Dtests=disabled
          if ($LASTEXITCODE -ne 0) { throw "configure failed with exit code $LASTEXITCODE" }
          python releng/meson/meson.py compile -C build
          if ($LASTEXITCODE -ne 0) { throw "compile failed with exit code $LASTEXITCODE" }
          python releng/meson/meson.py install -C build --no-rebuild --skip-subprojects
          if ($LASTEXITCODE -ne 0) { throw "install failed with exit code $LASTEXITCODE" }
          Get-ChildItem "$env:RUNNER_TEMP\frida-prefix\lib\pkgconfig\*.pc" | ForEach-Object {
            (Get-Content $_.FullName) -replace '^prefix=.*', 'prefix=${pcfiledir}/../..' |
              Set-Content $_.FullName
          }
          Pop-Location

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\frida-prefix
          key: ${{ runner.os }}-frida-core-${{ env.FRIDA_CORE_REF }}-v4

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\r2-prefix
          key: ${{ runner.os }}-radare2-${{ env.RADARE2_REF }}-v3

      - name: Build radare2 (shared)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/radareorg/radare2.git $env:RUNNER_TEMP\radare2
          Push-Location $env:RUNNER_TEMP\radare2
          git checkout $env:RADARE2_REF
          $env:CFLAGS = "/D_Static_assert=static_assert /std:c11"
          meson setup build "--prefix=$env:RUNNER_TEMP\r2-prefix" --default-library=shared -Dcli=disabled
          meson compile -C build
          meson install -C build
          Get-ChildItem "$env:RUNNER_TEMP\r2-prefix\lib\pkgconfig\*.pc" | ForEach-Object {
            (Get-Content $_.FullName) -replace '^prefix=.*', 'prefix=${pcfiledir}/../..' |
              Set-Content $_.FullName
          }
          Pop-Location

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\r2-prefix
          key: ${{ runner.os }}-radare2-${{ env.RADARE2_REF }}-v3

      - name: Update environment
        shell: bash
        run: |
          FRIDA_PKG="$RUNNER_TEMP/frida-prefix/lib/pkgconfig"
          R2_PKG="$RUNNER_TEMP/r2-prefix/lib/pkgconfig"
          VCPKG_PKG="C:/vcpkg/installed/x64-windows-release/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=$FRIDA_PKG;$R2_PKG;$VCPKG_PKG" >> $GITHUB_ENV
          echo "$RUNNER_TEMP\\frida-prefix\\bin" >> $GITHUB_PATH
          echo "$RUNNER_TEMP\\r2-prefix\\bin" >> $GITHUB_PATH
          # Extend CPATH with frida-core and radare2 headers so SwiftyR2 and
          # FridaCore shims can locate them without pkg-config.
          echo "CPATH=$CPATH;$RUNNER_TEMP/frida-prefix/include/frida-1.0;$RUNNER_TEMP/r2-prefix/include" >> $GITHUB_ENV
          echo "CPLUS_INCLUDE_PATH=$CPLUS_INCLUDE_PATH;$RUNNER_TEMP/frida-prefix/include/frida-1.0;$RUNNER_TEMP/r2-prefix/include" >> $GITHUB_ENV

      - name: Build LumaGtk
        run: cd LumaGtk && swift build -c release

      - name: Package MSI
        shell: pwsh
        run: |
          cd LumaGtk
          .\scripts\windows\package-msi.ps1 -SkipBuild -Configuration release `
              -VcpkgPrefix "C:/vcpkg/installed/x64-windows-release" `
              -FridaPrefix "$env:RUNNER_TEMP/frida-prefix" `
              -R2Prefix    "$env:RUNNER_TEMP/r2-prefix"

      - uses: actions/upload-artifact@v7
        with:
          name: Luma-windows-x64.msi
          path: LumaGtk/build/Luma-*.msi
          if-no-files-found: error
