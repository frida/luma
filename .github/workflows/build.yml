name: Build

on:
  push:
    branches: [main]
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  pull_request:

env:
  FRIDA_CORE_REF: "440a03f0d4aa731fd5634e023f4e6af8c709335f"
  RADARE2_REF: "7ed1e8c6fd000b99c8aa6835e12bef1657d92746"
  SPARKLE_VERSION: "2.9.1"
  SWIFT_VERSION: "6.2"
  LUMA_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.1.0' }}
  # ilammy/msvc-dev-cmd hasn't cut a Node-24-compatible release yet
  # (v1 is its only major). Opt into Node 24 ahead of GitHub's
  # forced migration in June 2026 so the warning doesn't clutter
  # every build log in the meantime.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  macos:
    # Apple Silicon Xcode cross-compiles to x86_64 natively, so both
    # matrix entries run on the free arm64 runner — no paid -large
    # runner needed for the Intel slice.
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install the Apple certificates
        env:
          CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "No signing certificates configured, skipping"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/apple-certificates.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/luma-signing.keychain-db
          echo -n "$CERTIFICATES_P12" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $CERTIFICATE_PATH
          MACOS_CERTID=$(security find-identity -v -p codesigning | grep "Developer ID Application: " | awk '{ print $2 }')
          echo "MACOS_CERTID=$MACOS_CERTID" >> $GITHUB_ENV
          echo "CAN_SIGN=true" >> $GITHUB_ENV

      - name: Install the Developer ID provisioning profile
        env:
          DEVELOPER_ID_PROFILE: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE }}
        run: |
          if [ "$CAN_SIGN" != "true" ]; then
            echo "Not signing; skipping provisioning profile"
            exit 0
          fi
          if [ -z "$DEVELOPER_ID_PROFILE" ]; then
            echo "CAN_SIGN=true but APPLE_DEVELOPER_ID_PROFILE is not set." >&2
            echo "The aps-environment entitlement requires an embedded Developer ID" >&2
            echo "provisioning profile, or macOS will refuse to launch the app." >&2
            exit 1
          fi
          PROFILE_PATH=$RUNNER_TEMP/developer-id.provisionprofile
          echo -n "$DEVELOPER_ID_PROFILE" | base64 --decode -o $PROFILE_PATH
          echo "DEVELOPER_ID_PROFILE_PATH=$PROFILE_PATH" >> $GITHUB_ENV

      - name: Build
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -derivedDataPath build/.derived \
            -arch ${{ matrix.arch }} \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            build
          mkdir -p build
          cp -r build/.derived/Build/Products/Release/Luma.app build/

      - name: Post-process binary
        run: |
          BINARY=build/Luma.app/Contents/MacOS/Luma
          install_name_tool -change \
            @rpath/Radare2.framework/Versions/A/Radare2 \
            @rpath/Radare2.framework/Radare2 \
            "$BINARY"
          strip -Sx "$BINARY"
          for fw in build/Luma.app/Contents/Frameworks/*.framework; do
            if [ -d "$fw/Versions" ]; then
              rm -rf "$fw/Versions"
            fi
            name=$(basename "$fw" .framework)
            if lipo -info "$fw/$name" 2>/dev/null | grep -q "Non-fat\|Architectures"; then
              lipo -thin ${{ matrix.arch }} "$fw/$name" -output "$fw/$name.thin"
              mv "$fw/$name.thin" "$fw/$name"
            fi
          done

      - name: Sign
        if: env.CAN_SIGN == 'true'
        run: |
          sign() {
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" "$1"
          }
          SPARKLE=build/Luma.app/Contents/Frameworks/Sparkle.framework
          if [ -d "$SPARKLE" ]; then
            if [ -d "$SPARKLE/Versions/Current" ]; then
              SPARKLE_ROOT="$SPARKLE/Versions/Current"
            else
              SPARKLE_ROOT="$SPARKLE"
            fi
            [ -f "$SPARKLE_ROOT/Autoupdate" ] && sign "$SPARKLE_ROOT/Autoupdate"
            for xpc in "$SPARKLE_ROOT"/XPCServices/*.xpc; do
              [ -d "$xpc" ] && sign "$xpc"
            done
            [ -d "$SPARKLE_ROOT/Updater.app" ] && sign "$SPARKLE_ROOT/Updater.app"
          fi
          find build/Luma.app/Contents/Frameworks -name '*.framework' -maxdepth 1 | while read fw; do
            name=$(basename "$fw" .framework)
            sign "$fw/$name"
          done
          cp "$DEVELOPER_ID_PROFILE_PATH" build/Luma.app/Contents/embedded.provisionprofile
          codesign --force --options runtime \
            --sign "Developer ID Application" \
            --entitlements Luma/Luma-macOS-Release.entitlements \
            --timestamp \
            build/Luma.app

      - name: Verify signed entitlements
        if: env.CAN_SIGN == 'true'
        run: |
          ENTITLEMENTS=$RUNNER_TEMP/signed-entitlements.plist
          codesign -d --entitlements - --xml build/Luma.app > $ENTITLEMENTS 2>/dev/null
          APS=$(plutil -extract 'aps-environment' raw -o - $ENTITLEMENTS 2>/dev/null || true)
          if [ "$APS" != "production" ]; then
            echo "aps-environment is '$APS', expected 'production'" >&2
            plutil -p $ENTITLEMENTS >&2
            exit 1
          fi
          if [ ! -f build/Luma.app/Contents/embedded.provisionprofile ]; then
            echo "embedded.provisionprofile is missing from the signed bundle" >&2
            exit 1
          fi
          PROFILE_PLIST=$RUNNER_TEMP/profile.plist
          security cms -D -i build/Luma.app/Contents/embedded.provisionprofile > $PROFILE_PLIST
          PROFILE_APS=$(plutil -extract 'Entitlements.aps-environment' raw -o - $PROFILE_PLIST 2>/dev/null || true)
          if [ "$PROFILE_APS" != "production" ]; then
            echo "::warning::Embedded provisioning profile aps-environment is '$PROFILE_APS', expected 'production'."
            echo "::warning::Regenerate APPLE_DEVELOPER_ID_PROFILE with Push Notifications enabled; the signed app will fail to launch until then."
            echo "--- Profile entitlements ---" >&2
            plutil -extract Entitlements xml1 -o - $PROFILE_PLIST >&2 || true
          fi

      - name: Notarize
        if: env.CAN_SIGN == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARY_PASSWORD"
          ditto -c -k --sequesterRsrc build/Luma.app Luma-notarize.zip
          RESULT=$(xcrun notarytool submit Luma-notarize.zip \
            --keychain-profile "notarytool-profile" \
            --wait 2>&1) || true
          echo "$RESULT"
          ID=$(echo "$RESULT" | grep '  id:' | head -1 | awk '{print $2}')
          STATUS=$(echo "$RESULT" | grep '  status:' | head -1 | awk '{print $2}')
          if [ "$STATUS" != "Accepted" ]; then
            echo "--- Notarization log ---"
            xcrun notarytool log "$ID" --keychain-profile "notarytool-profile" 2>&1 || true
            exit 1
          fi
          xcrun stapler staple build/Luma.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Luma" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Luma.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            Luma-${LUMA_VERSION}-${{ matrix.arch }}.dmg \
            build/Luma.app

      - name: Sign DMG for Sparkle
        if: env.CAN_SIGN == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "SPARKLE_PRIVATE_KEY secret is not set." >&2
            echo "Sparkle requires every DMG to be signed with the EdDSA" >&2
            echo "private key paired with SUPublicEDKey in Info.plist," >&2
            echo "or the auto-updater will refuse the download." >&2
            exit 1
          fi
          SPARKLE_DIR=$RUNNER_TEMP/sparkle
          mkdir -p $SPARKLE_DIR
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJf - -C $SPARKLE_DIR
          KEY_FILE=$RUNNER_TEMP/sparkle-priv.key
          printf %s "$SPARKLE_PRIVATE_KEY" > $KEY_FILE
          chmod 600 $KEY_FILE
          DMG=Luma-${LUMA_VERSION}-${{ matrix.arch }}.dmg
          SIG_LINE=$($SPARKLE_DIR/bin/sign_update -f $KEY_FILE "$DMG")
          rm -f $KEY_FILE
          echo "$SIG_LINE"
          SIG=$(echo "$SIG_LINE" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')
          if [ -z "$SIG" ] || [ "$SIG" = "$SIG_LINE" ]; then
            echo "Failed to extract edSignature from sign_update output." >&2
            exit 1
          fi
          printf %s "$SIG" > "${DMG}.sig"

      - uses: actions/upload-artifact@v7
        with:
          name: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg
          path: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg

      - uses: actions/upload-artifact@v7
        if: env.CAN_SIGN == 'true'
        with:
          name: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg.sig
          path: Luma-${{ env.LUMA_VERSION }}-${{ matrix.arch }}.dmg.sig

  ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install the Apple certificates
        env:
          CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATES_P12" ]; then
            echo "No signing certificates configured, will build unsigned"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/apple-certificates.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/luma-signing.keychain-db
          echo -n "$CERTIFICATES_P12" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm $CERTIFICATE_PATH
          if ! security find-identity -v -p codesigning | grep -q "Apple Distribution"; then
            echo "No Apple Distribution identity in the provided certificate bundle." >&2
            echo "Add one to APPLE_CERTIFICATES_P12 to enable iOS archive builds." >&2
            exit 0
          fi
          echo "CAN_SIGN=true" >> $GITHUB_ENV

      - name: Install the App Store Connect API key
        if: env.CAN_SIGN == 'true'
        env:
          KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          KEY_P8: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_P8 }}
        run: |
          if [ -z "$KEY_ID" ] || [ -z "$ISSUER_ID" ] || [ -z "$KEY_P8" ]; then
            echo "CAN_SIGN=true but App Store Connect API credentials are not set." >&2
            echo "Configure APPLE_APP_STORE_CONNECT_KEY_ID, _ISSUER_ID and _KEY_P8" >&2
            echo "so xcodebuild can fetch iOS provisioning profiles." >&2
            exit 1
          fi
          KEYS_DIR=$HOME/.appstoreconnect/private_keys
          mkdir -p $KEYS_DIR
          KEY_FILE=$KEYS_DIR/AuthKey_${KEY_ID}.p8
          printf %s "$KEY_P8" > $KEY_FILE
          echo "ASC_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          echo "ASC_ISSUER_ID=$ISSUER_ID" >> $GITHUB_ENV
          echo "ASC_KEY_FILE=$KEY_FILE" >> $GITHUB_ENV

      - name: Build (unsigned, iOS Simulator)
        if: env.CAN_SIGN != 'true'
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/.derived-ios \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Archive
        if: env.CAN_SIGN == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project Luma.xcodeproj \
            -scheme Luma \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Luma.xcarchive \
            -derivedDataPath build/.derived-ios \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_FILE" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM=$TEAM_ID \
            MARKETING_VERSION=$LUMA_VERSION \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export IPA
        if: env.CAN_SIGN == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          EXPORT_OPTIONS=$RUNNER_TEMP/ExportOptions.plist
          cat > $EXPORT_OPTIONS <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/Luma.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist $EXPORT_OPTIONS \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_FILE" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          mv build/ipa/Luma.ipa Luma-${LUMA_VERSION}.ipa

      - uses: actions/upload-artifact@v7
        if: env.CAN_SIGN == 'true'
        with:
          name: Luma-${{ env.LUMA_VERSION }}.ipa
          path: Luma-${{ env.LUMA_VERSION }}.ipa

      - name: Upload to TestFlight
        if: env.CAN_SIGN == 'true' && github.ref_type == 'tag'
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file Luma-${LUMA_VERSION}.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

  fedora:
    runs-on: ubuntu-latest
    container: fedora:43
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gtk4-devel \
            libadwaita-devel \
            webkitgtk6.0-devel \
            glib2-devel \
            pango-devel \
            cairo-devel \
            harfbuzz-devel \
            gdk-pixbuf2-devel \
            graphene-devel \
            libsoup3-devel \
            gobject-introspection-devel \
            atk-devel \
            libxml2-devel \
            libzip-devel \
            zlib-devel \
            libgee-devel \
            json-glib-devel \
            libunwind-devel \
            libdwarf-devel \
            elfutils-devel \
            libnice-devel \
            ngtcp2-devel \
            ngtcp2-crypto-ossl-devel \
            openssl-devel \
            vala \
            meson \
            ninja-build \
            nodejs \
            npm \
            gcc \
            gcc-c++ \
            libstdc++-devel \
            libstdc++-static \
            kernel-headers \
            glibc-devel \
            make \
            git \
            which \
            curl \
            pkg-config \
            rpm-build \
            python3-pip \
            python3-setuptools

      - name: Install Swift
        run: |
          dnf install -y swiftlang
          swift --version

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-fedora43-frida-core-${{ env.FRIDA_CORE_REF }}-v2

      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          git checkout $FRIDA_CORE_REF
          ./configure --enable-shared --without-prebuilds=sdk --prefix=/usr
          make -j$(nproc)
          DESTDIR=/tmp/frida-destdir make install

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-fedora43-frida-core-${{ env.FRIDA_CORE_REF }}-v2

      - name: Install frida-core
        run: |
          cp -a /tmp/frida-destdir/usr/. /usr/
          ldconfig

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-fedora43-radare2-${{ env.RADARE2_REF }}-v2

      - name: Build radare2 (static)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        env:
          CC: gcc
          CXX: g++
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr --default-library=static -Dstatic_runtime=true -Dcli=disabled -Duse_sys_zip=true
          DESTDIR=/tmp/r2-destdir ninja -C build install

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-fedora43-radare2-${{ env.RADARE2_REF }}-v2

      - name: Install radare2
        run: |
          cp -a /tmp/r2-destdir/usr/. /usr/
          ldconfig

      - uses: actions/checkout@v6

      - name: Install packaging tools
        run: dnf install -y patchelf rsync

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package as .rpm
        run: |
          TOP=$PWD/rpmbuild
          mkdir -p $TOP/{SOURCES/stage,SPECS,BUILD,BUILDROOT,RPMS,SRPMS}
          LumaGtk/build-aux/linux/stage.sh \
              $TOP/SOURCES/stage \
              LumaGtk/.build/x86_64-unknown-linux-gnu/release/LumaGtk \
              /usr/lib64 \
              /usr/libexec/swift/6.2/lib/swift/linux \
              /usr/lib64/libxml2.so.2
          cp LumaGtk/build-aux/rpm/luma.spec $TOP/SPECS/
          rpmbuild --define "_topdir $TOP" \
                   --define "version $LUMA_VERSION" \
                   -bb $TOP/SPECS/luma.spec
          cp $TOP/RPMS/x86_64/luma-${LUMA_VERSION}-*.x86_64.rpm luma-${LUMA_VERSION}-fedora-43-x86_64.rpm

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-fedora-43-x86_64.rpm
          path: luma-${{ env.LUMA_VERSION }}-fedora-43-x86_64.rpm

  ubuntu:
    runs-on: ubuntu-latest
    container: ubuntu:25.10
    steps:
      - name: Install system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y universe
          apt-get update
          apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libwebkitgtk-6.0-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libharfbuzz-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            libsoup-3.0-dev \
            gobject-introspection \
            libgirepository1.0-dev \
            libatk1.0-dev \
            libxml2-dev \
            libzip-dev \
            zlib1g-dev \
            libgee-0.8-dev \
            libjson-glib-dev \
            libunwind-dev \
            libnice-dev \
            valac \
            meson \
            ninja-build \
            pkg-config \
            dpkg-dev \
            nodejs \
            npm \
            curl \
            git \
            make \
            binutils \
            python3-pip \
            gcc \
            g++

      - name: Install Swift
        run: |
          apt-get install -y libncurses6 libcurl4-openssl-dev
          ln -sf libxml2.so.16 /usr/lib/x86_64-linux-gnu/libxml2.so.2
          ldconfig
          curl -sLO "https://download.swift.org/swift-${SWIFT_VERSION}-release/ubuntu2404/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE-ubuntu24.04.tar.gz"
          tar xzf swift-*.tar.gz -C /usr/local --strip-components=2
          rm swift-*.tar.gz
          ldconfig
          swift --version

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-ubuntu2510-frida-core-${{ env.FRIDA_CORE_REF }}-v2

      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/frida/frida-core.git /tmp/frida-core
          cd /tmp/frida-core
          git checkout $FRIDA_CORE_REF
          ./configure --enable-shared --without-prebuilds=sdk --prefix=/usr \
            -- --force-fallback-for=openssl
          make -j$(nproc)
          DESTDIR=/tmp/frida-destdir make install

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/frida-destdir
          key: ${{ runner.os }}-ubuntu2510-frida-core-${{ env.FRIDA_CORE_REF }}-v2

      - name: Install frida-core
        run: |
          cp -a /tmp/frida-destdir/usr/. /usr/
          ldconfig

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-ubuntu2510-radare2-${{ env.RADARE2_REF }}-v2

      - name: Build radare2 (static)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/radareorg/radare2.git /tmp/radare2
          cd /tmp/radare2
          git checkout $RADARE2_REF
          meson setup build --prefix=/usr --default-library=static -Dstatic_runtime=true -Dcli=disabled -Duse_sys_zip=true
          DESTDIR=/tmp/r2-destdir ninja -C build install

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/r2-destdir
          key: ${{ runner.os }}-ubuntu2510-radare2-${{ env.RADARE2_REF }}-v2

      - name: Install radare2
        run: |
          cp -a /tmp/r2-destdir/usr/. /usr/
          ldconfig

      - uses: actions/checkout@v6

      - name: Install packaging tools
        run: apt-get install -y patchelf rsync

      - name: Build
        run: cd LumaGtk && make build SWIFT_BUILD_FLAGS="-c release"

      - name: Package as .deb
        run: |
          PKG=luma_${LUMA_VERSION}_amd64
          LumaGtk/build-aux/linux/stage.sh \
              $PKG \
              LumaGtk/.build/x86_64-unknown-linux-gnu/release/LumaGtk \
              /usr/lib/x86_64-linux-gnu \
              /usr/local/lib/swift/linux \
              /usr/lib/x86_64-linux-gnu/libxml2.so.16
          mkdir -p $PKG/DEBIAN
          printf 'Package: luma\nVersion: %s\nSection: devel\nPriority: optional\nArchitecture: amd64\nDepends: libgtk-4-1, libadwaita-1-0, libwebkitgtk-6.0-4, libsoup-3.0-0\nMaintainer: Ole Andre Vadla Ravnas <oleavr@frida.re>\nDescription: Luma - Dynamic instrumentation toolkit\n Interactive dynamic instrumentation app built on Frida.\n' "$LUMA_VERSION" > $PKG/DEBIAN/control
          dpkg-deb --build $PKG
          mv ${PKG}.deb luma-${LUMA_VERSION}-ubuntu-25.10-x86_64.deb

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-ubuntu-25.10-x86_64.deb
          path: luma-${{ env.LUMA_VERSION }}-ubuntu-25.10-x86_64.deb

  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50

      - name: Restore flatpak-builder cache
        id: flatpak-cache
        uses: actions/cache/restore@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-v1

      - name: Pin flatpak sources to the current tree
        run: |
          git archive --format=tar.gz --prefix=luma/ --output=/tmp/luma-source.tar.gz HEAD
          python3 - <<'PY'
          import json, os
          path = "LumaGtk/build-aux/flatpak/re.frida.Luma.json"
          with open(path) as f:
              manifest = json.load(f)
          for module in manifest.get("modules", []):
              for i, source in enumerate(module.get("sources", [])):
                  url = source.get("url", "")
                  if url.endswith("frida/frida-core.git"):
                      source.pop("branch", None)
                      source["commit"] = os.environ["FRIDA_CORE_REF"]
                  elif url.endswith("frida/luma.git"):
                      module["sources"][i] = {
                          "type": "archive",
                          "path": "/tmp/luma-source.tar.gz",
                      }
          with open(path, "w") as f:
              json.dump(manifest, f, indent=4)
          PY

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --disable-rofiles-fuse \
            --keep-build-dirs \
            --repo=flatpak-repo \
            flatpak-build \
            LumaGtk/build-aux/flatpak/re.frida.Luma.json
          flatpak build-bundle flatpak-repo "luma-${LUMA_VERSION}-x86_64.flatpak" re.frida.Luma

      - name: Save flatpak-builder cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-v1

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-x86_64.flatpak
          path: luma-${{ env.LUMA_VERSION }}-x86_64.flatpak

  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set snap version
        run: |
          sed -i "s/^version: .*/version: '${LUMA_VERSION}'/" \
              LumaGtk/build-aux/snap/snapcraft.yaml

      - name: Pin snap sources to the current tree
        run: |
          # The snapcraft VM only sees files under the project path
          # (LumaGtk), so stage the tarball there.
          git archive --format=tar.gz --output=LumaGtk/luma-source.tar.gz HEAD
          python3 - <<'PY'
          import os, re
          path = "LumaGtk/build-aux/snap/snapcraft.yaml"
          with open(path) as f:
              text = f.read()
          text = re.sub(
              r"(source: https://github\.com/frida/frida-core\.git\n\s*)source-branch: main",
              lambda m: m.group(1) + "source-commit: " + os.environ["FRIDA_CORE_REF"],
              text,
          )
          text = re.sub(
              r"source: https://github\.com/frida/luma\.git\n(\s*)source-branch: main",
              r"source: luma-source.tar.gz\n\1source-type: tar",
              text,
          )
          with open(path, "w") as f:
              f.write(text)
          PY

      - uses: snapcore/action-build@v1.3.0
        id: snapcraft
        with:
          path: LumaGtk

      - name: Rename snap artifact
        run: cp "${{ steps.snapcraft.outputs.snap }}" "luma-${LUMA_VERSION}-x86_64.snap"

      - uses: actions/upload-artifact@v7
        with:
          name: luma-${{ env.LUMA_VERSION }}-x86_64.snap
          path: luma-${{ env.LUMA_VERSION }}-x86_64.snap

  windows:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            win_arch: x86_64
            msvc_arch: amd64
            swift_build_arch: amd64
            vcpkg_triplet: x64-windows-release
            toolcache_arch: x64
            msys2_system: MINGW64
            msys2_package: mingw-w64-x86_64-gcc
          - runner: windows-11-arm
            win_arch: arm64
            msvc_arch: arm64
            swift_build_arch: arm64
            vcpkg_triplet: arm64-windows-release
            toolcache_arch: arm64
            msys2_system: CLANGARM64
            msys2_package: mingw-w64-clang-aarch64-clang
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - uses: compnerd/gha-setup-swift@v0.4.0
        with:
          swift-version: "swift-${{ env.SWIFT_VERSION }}-release"
          swift-build: "${{ env.SWIFT_VERSION }}-RELEASE"
          build_arch: ${{ matrix.swift_build_arch }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          pip install meson ninja setuptools

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ matrix.vcpkg_triplet }}-v9

      - name: Install dependencies via vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: >-
          vcpkg install
          --overlay-triplets=${{ github.workspace }}/.github/vcpkg-triplets
          --overlay-ports=${{ github.workspace }}/.github/vcpkg-ports
          --triplet ${{ matrix.vcpkg_triplet }}
          glib glib-networking json-glib libsoup gtk[introspection] atk[introspection] libadwaita[introspection] libxml2 graphite2 sqlite3[snapshot] webview2

      - name: Save vcpkg cache
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ matrix.vcpkg_triplet }}-v9

      - name: Set up vcpkg environment
        shell: bash
        run: |
          VCPKG_PREFIX="C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}"
          echo "$VCPKG_PREFIX/tools/pkgconf" >> $GITHUB_PATH
          echo "$VCPKG_PREFIX/bin" >> $GITHUB_PATH
          echo "$VCPKG_PREFIX/tools" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=$VCPKG_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          # pkgconf on this runner classifies $VCPKG_PREFIX/include as a
          # system path (via the INCLUDE env var MSVC sets) and strips
          # -I fragments that live under it, which breaks glib's
          # -I${includedir}/glib-2.0 Cflags. Opt back in.
          echo "PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_SYSTEM_LIBS=1" >> $GITHUB_ENV
          echo "GIR_EXTRA_SEARCH_PATH=$VCPKG_PREFIX/share/gir-1.0" >> $GITHUB_ENV
          # Package.swift calls "pkg-config"; vcpkg ships pkgconf.exe. Alias it.
          if [ -f "$VCPKG_PREFIX/tools/pkgconf/pkgconf.exe" ] && [ ! -f "$VCPKG_PREFIX/tools/pkgconf/pkg-config.exe" ]; then
            cp "$VCPKG_PREFIX/tools/pkgconf/pkgconf.exe" "$VCPKG_PREFIX/tools/pkgconf/pkg-config.exe"
          fi
          # Mirror root-level vcpkg headers (WebView2.h, sqlite3.h,
          # ...) into a staging dir, skipping dirent.h whose vcpkg
          # polyfill clashes with Swift's _FoundationCShims. Put just
          # the shim on CPATH — everything else (gtk4, libadwaita,
          # frida-core, radare2, ...) propagates through SwiftPM's
          # .systemLibrary(pkgConfig:) resolver.
          STAGE="$VCPKG_PREFIX/include/vcpkg-shim"
          mkdir -p "$STAGE"
          for hdr in "$VCPKG_PREFIX"/include/*.h; do
            name=$(basename "$hdr")
            case "$name" in
              dirent.h) ;;
              *) cp "$hdr" "$STAGE/" ;;
            esac
          done
          echo "CPATH=$STAGE" >> $GITHUB_ENV
          echo "CPLUS_INCLUDE_PATH=$STAGE" >> $GITHUB_ENV

      - name: Restore frida-core cache
        id: frida-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\frida-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-frida-core-${{ env.FRIDA_CORE_REF }}-v6

      - name: Install Go toolchain
        if: steps.frida-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # setup-go@v6 runs `go env GOPATH` within the same step as
          # addPath(), which on Node 24 + Windows never sees the
          # updated PATH and fails with "'go' is not recognized".
          # Hosted runners ship a preinstalled Go in the toolcache;
          # just surface it on PATH ourselves.
          $goRoot = Get-ChildItem 'C:\hostedtoolcache\windows\go' -Directory |
              Sort-Object { [version]$_.Name } -Descending |
              Select-Object -First 1
          $goBin = Join-Path $goRoot.FullName '${{ matrix.toolcache_arch }}\bin'
          "$goBin" >> $env:GITHUB_PATH
          & (Join-Path $goBin 'go.exe') version

      - name: Install MinGW toolchain for cgo
        if: steps.frida-cache.outputs.cache-hit != 'true'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msys2_system }}
          install: ${{ matrix.msys2_package }}
          path-type: inherit


      - name: Build frida-core (shared)
        if: steps.frida-cache.outputs.cache-hit != 'true'
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $ErrorActionPreference = 'Stop'
          git clone https://github.com/frida/frida-core.git $env:RUNNER_TEMP\frida-core
          Push-Location $env:RUNNER_TEMP\frida-core
          git checkout $env:FRIDA_CORE_REF
          git submodule update --init --recursive --depth 1
          python -c "import sys; sys.path.insert(0, '.'); from releng.meson_configure import main; main()" `
              . `
              --enable-shared `
              --without-prebuilds=sdk `
              "--prefix=$env:RUNNER_TEMP\frida-prefix" `
              -- --force-fallback-for=openssl,libnghttp2 -Dtests=disabled
          if ($LASTEXITCODE -ne 0) {
              Write-Host "---- meson-log.txt ----"
              Get-Content build\meson-logs\meson-log.txt -ErrorAction SilentlyContinue
              throw "configure failed with exit code $LASTEXITCODE"
          }
          python releng/meson/meson.py compile -C build
          if ($LASTEXITCODE -ne 0) { throw "compile failed with exit code $LASTEXITCODE" }
          python releng/meson/meson.py install -C build --no-rebuild --skip-subprojects
          if ($LASTEXITCODE -ne 0) { throw "install failed with exit code $LASTEXITCODE" }
          Get-ChildItem "$env:RUNNER_TEMP\frida-prefix\lib\pkgconfig\*.pc" | ForEach-Object {
            (Get-Content $_.FullName) -replace '^prefix=.*', 'prefix=${pcfiledir}/../..' |
              Set-Content $_.FullName
          }
          Pop-Location

      - name: Save frida-core cache
        if: steps.frida-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\frida-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-frida-core-${{ env.FRIDA_CORE_REF }}-v6

      - name: Restore radare2 cache
        id: r2-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}\r2-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-radare2-${{ env.RADARE2_REF }}-v3

      - name: Build radare2 (shared)
        if: steps.r2-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/radareorg/radare2.git $env:RUNNER_TEMP\radare2
          Push-Location $env:RUNNER_TEMP\radare2
          git checkout $env:RADARE2_REF
          $env:CFLAGS = "/D_Static_assert=static_assert /std:c11"
          meson setup build "--prefix=$env:RUNNER_TEMP\r2-prefix" --default-library=shared -Dcli=disabled
          meson compile -C build
          meson install -C build
          Get-ChildItem "$env:RUNNER_TEMP\r2-prefix\lib\pkgconfig\*.pc" | ForEach-Object {
            (Get-Content $_.FullName) -replace '^prefix=.*', 'prefix=${pcfiledir}/../..' |
              Set-Content $_.FullName
          }
          Pop-Location

      - name: Save radare2 cache
        if: steps.r2-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}\r2-prefix
          key: ${{ runner.os }}-${{ matrix.win_arch }}-radare2-${{ env.RADARE2_REF }}-v3

      - name: Update environment
        shell: bash
        run: |
          FRIDA_PKG="$RUNNER_TEMP/frida-prefix/lib/pkgconfig"
          R2_PKG="$RUNNER_TEMP/r2-prefix/lib/pkgconfig"
          VCPKG_PKG="C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=$FRIDA_PKG;$R2_PKG;$VCPKG_PKG" >> $GITHUB_ENV
          echo "$RUNNER_TEMP\\frida-prefix\\bin" >> $GITHUB_PATH
          echo "$RUNNER_TEMP\\r2-prefix\\bin" >> $GITHUB_PATH

      - name: Install native sed/awk/cat for gir2swift post-processing
        shell: pwsh
        run: |
          # gir2swift shells out to sed, awk and cat to patch generated
          # Swift sources. Git for Windows' cygwin-based versions crash
          # at fork() time on Actions runners with "add_item (\??\C:\
          # Program Files\Git, /, ...) failed, errno 1" — a classic
          # cygwin heap-rebase failure. The consequence is missing types
          # like SequenceIterRef/SListProtocol in the SwiftGLib output
          # and later compile errors. Install GnuWin32's native Win32
          # ports and put them first on PATH so they win the PATH lookup.
          choco install -y --no-progress sed gawk gnuwin32-coreutils.install
          $gnuBin = 'C:\Program Files (x86)\GnuWin32\bin'
          if (Test-Path (Join-Path $gnuBin 'gawk.exe')) {
              Copy-Item (Join-Path $gnuBin 'gawk.exe') (Join-Path $gnuBin 'awk.exe') -Force
          }
          Add-Content -Path $env:GITHUB_PATH -Value $gnuBin

      - name: Build LumaGtk
        shell: pwsh
        run: |
          # SwiftPM invokes swiftc.exe as the final link driver with
          # every .o, -L path and -l ref on the command line. On a
          # GTK/WebKit/Frida/r2 build that overshoots Windows' ~32 KB
          # CreateProcess limit and aborts with "The filename or
          # extension is too long". Map every long path that appears
          # on the link line to a drive-letter root via `subst`, which
          # collapses each prefix to 3 characters and keeps the
          # aggregate cmdline under the cap.
          $subst = Join-Path $env:WINDIR 'System32\subst.exe'
          $buildRoot = "$env:RUNNER_TEMP\b"
          New-Item -Path $buildRoot -ItemType Directory -Force | Out-Null
          $swiftRoot = Split-Path -Parent (Split-Path -Parent (Get-Command swift).Source)
          $vcpkgPrefix = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}"
          $fridaPrefix = "$env:RUNNER_TEMP\frida-prefix"
          $r2Prefix    = "$env:RUNNER_TEMP\r2-prefix"
          $mappings = [ordered]@{
              'B:' = $buildRoot
              'T:' = $swiftRoot
              'V:' = $vcpkgPrefix
              'F:' = $fridaPrefix
              'R:' = $r2Prefix
          }
          foreach ($letter in $mappings.Keys) {
              & $subst $letter $mappings[$letter]
              if ($LASTEXITCODE -ne 0) { throw "subst $letter failed" }
          }
          try {
              $env:PATH = "T:\bin;F:\bin;R:\bin;$env:PATH"
              $env:PKG_CONFIG_PATH = "F:\lib\pkgconfig;R:\lib\pkgconfig;V:\lib\pkgconfig"
              cd LumaGtk
              swift build -c release `
                  --build-path B:\ `
                  -Xlinker /ignore:importeddllmain `
                  -Xlinker /ignore:4217
              if ($LASTEXITCODE -ne 0) { throw "swift build failed ($LASTEXITCODE)" }
          } finally {
              foreach ($letter in $mappings.Keys) {
                  & $subst $letter /d | Out-Null
              }
          }

      - name: Install WiX Toolset
        if: matrix.win_arch == 'arm64'
        shell: pwsh
        run: choco install -y --no-progress wixtoolset

      - name: Package MSI
        shell: pwsh
        run: |
          cd LumaGtk
          .\scripts\windows\package-msi.ps1 -SkipBuild -Configuration release `
              -Version "$env:LUMA_VERSION" `
              -Arch "${{ matrix.win_arch }}" `
              -BuildPath "$env:RUNNER_TEMP/b" `
              -VcpkgPrefix "C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}" `
              -FridaPrefix "$env:RUNNER_TEMP/frida-prefix" `
              -R2Prefix    "$env:RUNNER_TEMP/r2-prefix"

      - uses: actions/upload-artifact@v7
        with:
          name: Luma-${{ env.LUMA_VERSION }}-${{ matrix.win_arch }}.msi
          path: LumaGtk/build/Luma-${{ env.LUMA_VERSION }}-${{ matrix.win_arch }}.msi
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: [macos, ios, fedora, ubuntu, flatpak, snap, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: true
